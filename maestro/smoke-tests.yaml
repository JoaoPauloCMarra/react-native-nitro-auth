appId: com.auth.example
name: "Smoke Tests - All Pass"
---

- clearState
- launchApp

- scrollUntilVisible:
    element: "Smoke Tests"
    direction: DOWN

- tapOn: "Run"

- extendedWaitUntil:
    visible: "Run again"
    timeout: 30000

- assertNotVisible: "failed"

- assertVisible: "13/18 passed, 5 skipped"
