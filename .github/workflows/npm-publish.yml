name: Publish npm

on:
  release:
    types: [published]

env:
  BUN_VERSION: "1.3.10"
  NODE_VERSION: "22"
  PACKAGE_DIR: packages/react-native-nitro-auth

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish react-native-nitro-auth
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: https://registry.npmjs.org

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install C++ coverage tools
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm

      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - uses: actions/cache@v5
        with:
          path: |
            ~/.bun/install/cache
            node_modules
            packages/*/node_modules
            apps/*/node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('**/bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      - name: Verify release tag
        run: |
          PACKAGE_VERSION="$(node -p "require('./${PACKAGE_DIR}/package.json').version")"
          RELEASE_TAG="${GITHUB_REF_NAME#v}"

          if [ "$PACKAGE_VERSION" != "$RELEASE_TAG" ]; then
            echo "Release tag ${GITHUB_REF_NAME} does not match package version ${PACKAGE_VERSION}."
            exit 1
          fi

      - name: Validate publish package
        run: bun scripts/publish.js --dry-run --skip-git-check

      - name: Resolve npm dist tag
        id: dist-tag
        run: |
          PACKAGE_VERSION="$(node -p "require('./${PACKAGE_DIR}/package.json').version")"
          if [[ "$PACKAGE_VERSION" == *-* ]]; then
            echo "tag=next" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        working-directory: ${{ env.PACKAGE_DIR }}
        run: npm publish --access public --tag "${{ steps.dist-tag.outputs.tag }}" --ignore-scripts
